<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal JS to PPTX Sandbox (Fixed)</title>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/PptxGenJS@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 2rem; border-radius: 1rem; width: 100%; max-width: 800px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { color: var(--primary); margin-top: 0; }
        .drop-zone { border: 2px dashed #475569; padding: 40px; text-align: center; border-radius: 0.5rem; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .drop-zone:hover { border-color: var(--primary); background: #1e293b; }
        #status { margin-top: 20px; padding: 15px; border-radius: 0.5rem; display: none; font-size: 14px; }
        .success { background: #065f46; color: #34d399; }
        .error { background: #7f1d1d; color: #fca5a5; }
        .log-area { background: #000; color: #10b981; font-family: monospace; padding: 10px; border-radius: 4px; height: 180px; overflow-y: auto; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>JS to PPTX Converter</h1>
    <p style="color: #94a3b8">Upload file <code>.js</code> yang menggunakan PptxGenJS.</p>
    
    <div class="drop-zone" id="dropZone">
        <p id="fileName">Tarik file .js ke sini atau klik untuk pilih file</p>
        <input type="file" id="fileInput" accept=".js" style="display: none">
    </div>

    <button id="convertBtn" style="width: 100%; padding: 12px; background: var(--primary); border: none; color: white; border-radius: 6px; font-weight: bold; cursor: pointer;">
        PROSES & GENERATE PPTX
    </button>

    <div id="status"></div>
    <div class="log-area" id="logArea">System Ready...</div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const convertBtn = document.getElementById('convertBtn');
    const status = document.getElementById('status');
    const logArea = document.getElementById('logArea');

    let uploadedCode = "";
    let currentFileName = "presentation.pptx";

    // MOCKING ENVIRONMENT
    const windowMock = {
        require: function(module) {
            log(`System bypassing node module: ${module}`);
            if (module.includes('pptxgenjs')) return PptxGenJS;
            return {}; // Return object kosong untuk react, sharp, dll agar tidak crash
        },
        console: {
            log: (m) => log(`Code Log: ${m}`),
            error: (m) => log(`Code Error: ${m}`)
        }
    };

    function log(msg) {
        const div = document.createElement('div');
        div.textContent = `> ${msg}`;
        logArea.appendChild(div);
        logArea.scrollTop = logArea.scrollHeight;
    }

    dropZone.onclick = () => fileInput.click();

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) handleFile(file);
    };

    function handleFile(file) {
        document.getElementById('fileName').textContent = file.name;
        currentFileName = file.name.replace('.js', '.pptx');
        const reader = new FileReader();
        reader.onload = (e) => {
            uploadedCode = e.target.result;
            log(`File ${file.name} loaded.`);
        };
        reader.readAsText(file);
    }

    convertBtn.onclick = async () => {
        if (!uploadedCode) return alert("Upload file .js terlebih dahulu!");
        
        status.style.display = "block";
        status.className = "";
        status.textContent = "Sedang memproses...";
        log("Starting conversion sandbox...");

        try {
            const require = windowMock.require;
            
            // Pembersihan kode pintar:
            let cleanCode = uploadedCode
                // 1. Matikan require-require Node.js bawaan script
                .replace(/const\s+.*?\s*=\s*require\(.*?\);/g, (match) => {
                    if (match.includes('pptxgenjs')) return 'const pptxgen = PptxGenJS;';
                    return `// Bypassed: ${match}`;
                })
                // 2. Matikan total fungsi iconPng asli agar tidak crash akibat sharp/react-dom
                .replace(/async\s+function\s+iconPng[\s\S]*?\{\s*[\s\S]*?return[\s\S]*?\}/g, 
                    `async function iconPng() { 
                        // Mengembalikan gambar placeholder transparan berukuran 1x1 pixel
                        return "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwAEhQGAhKmMIQAAAABJRU5ErkJggg=="; 
                     }`
                )
                // 3. Ubah pres.writeFile agar mendownload langsung ke browser, bukan ke path linux (/mnt/...)
                .replace(/await\s+pres\.writeFile\(\{[\s\S]*?\}\);/g, `await pres.writeFile({ fileName: "${currentFileName}" });`);

            // Eksekusi kode secara dinamis di dalam sandbox browser
            const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
            const executeCode = new AsyncFunction('PptxGenJS', 'require', cleanCode);
            
            await executeCode(PptxGenJS, require);

            status.className = "success";
            status.textContent = "Berhasil! File PPTX otomatis terdownload.";
            log("Conversion Finished Successfully.");

        } catch (err) {
            console.error(err);
            status.className = "error";
            status.textContent = "Error: " + err.message;
            log(`CRITICAL ERROR: ${err.message}`);
        }
    };
</script>
</body>
</html>
