<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>JS to PPT Generator</title>
    <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <style>
        body { background: #0f172a; color: white; display: flex; justify-content: center; padding-top: 50px; font-family: sans-serif; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; width: 400px; text-align: center; }
        input { display: none; }
        .btn { background: #ec4899; padding: 15px; border-radius: 10px; cursor: pointer; display: block; }
        #status { margin-top: 20px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="box">
    <h2>Upload File .js</h2>
    <label class="btn" for="file">Pilih File .js</label>
    <input type="file" id="file" accept=".js">
    <div id="status">Menunggu file...</div>
</div>

<script>
    document.getElementById('file').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const pres = new PptxGenJS();
                // Menjalankan kode dari file JS yang diupload
                const run = new Function('pres', event.target.result);
                run(pres);
                
                pres.writeFile({ fileName: 'Hasil_PPT.pptx' });
                document.getElementById('status').innerText = "Berhasil! PPT sedang diunduh.";
            } catch (err) {
                document.getElementById('status').innerText = "Error: " + err.message;
            }
        };
        reader.readAsText(e.target.files[0]);
    });
</script>

</body>
</html>
